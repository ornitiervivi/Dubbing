spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cloud_dubber}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health
springdoc:
  swagger-ui:
    path: /swagger-ui.html
clouddubber:
  transcription:
    provider: ${CLOUDDUBBER_TRANSCRIPTION_PROVIDER:development}
    language-hint: ${CLOUDDUBBER_TRANSCRIPTION_LANGUAGE_HINT:en}
    timeout: ${CLOUDDUBBER_TRANSCRIPTION_TIMEOUT:PT30S}
    max-audio-size: ${CLOUDDUBBER_TRANSCRIPTION_MAX_AUDIO_SIZE:52428800}
    store-transcript-asset: ${CLOUDDUBBER_TRANSCRIPTION_STORE_TRANSCRIPT_ASSET:false}
    output-format: ${CLOUDDUBBER_TRANSCRIPTION_OUTPUT_FORMAT:json}
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    transcription-model: ${OPENAI_TRANSCRIPTION_MODEL:gpt-4o-mini-transcribe}
  ffmpeg:
    binary-path: ${CLOUDDUBBER_FFMPEG_BINARY_PATH:ffmpeg}
    audio-format: ${CLOUDDUBBER_FFMPEG_AUDIO_FORMAT:mp3}
    audio-codec: ${CLOUDDUBBER_FFMPEG_AUDIO_CODEC:libmp3lame}
    timeout: ${CLOUDDUBBER_FFMPEG_TIMEOUT:PT30S}
  pipeline:
    worker:
      enabled: ${CLOUDDUBBER_PIPELINE_WORKER_ENABLED:true}
      fixed-delay: ${CLOUDDUBBER_PIPELINE_WORKER_DELAY:5000}
      batch-size: ${CLOUDDUBBER_PIPELINE_WORKER_BATCH:5}
    temp-directory: ${CLOUDDUBBER_PIPELINE_TEMP_DIRECTORY:/tmp/clouddubber}
